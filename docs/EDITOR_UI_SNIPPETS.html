<!-- 
  Como adicionar botão do editor de layout nas páginas admin
  Layout agora é subdocumento de evento.layout_ingresso (zero mudanças no banco!)
-->

<!-- Opção 1: Botão simples -->
<a href="/admin/editor?evento_id={{ evento._id }}" 
   class="btn btn-primary">
    <i class="material-symbols-outlined">design_services</i>
    <span>Editar Layout do Ingresso</span>
</a>

<!-- Opção 2: Card completo -->
<div class="card bg-slate-800 border border-slate-700 rounded-lg p-4 mb-4">
    <div class="flex justify-between items-start">
        <div>
            <h3 class="text-lg font-semibold text-white mb-2">
                <i class="material-symbols-outlined inline-block align-middle">badge</i>
                Layout do Ingresso
            </h3>
            <p class="text-slate-400 text-sm">
                Editor visual com canvas interativo
            </p>
        </div>
        <a href="/admin/editor?evento_id={{ evento._id }}"
           class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition">
            <i class="material-symbols-outlined">design_services</i>
            <span>Abrir Editor</span>
        </a>
    </div>
</div>

<!-- Opção 3: Botão na lista de eventos -->
<td class="px-4 py-3">
    <div class="flex gap-2">
        <a href="/admin/eventos/{{ evento._id }}" 
           class="text-blue-400 hover:text-blue-300"
           title="Ver detalhes">
            <i class="material-symbols-outlined">visibility</i>
        </a>
        <a href="/admin/editor?evento_id={{ evento._id }}"
           class="text-purple-400 hover:text-purple-300"
           title="Editor de Layout">
            <i class="material-symbols-outlined">palette</i>
        </a>
        <a href="/admin/eventos/{{ evento._id }}/editar"
           class="text-yellow-400 hover:text-yellow-300"
           title="Editar evento">
            <i class="material-symbols-outlined">edit</i>
        </a>
    </div>
</td>
