<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Layout - {{ evento_nome }}</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- React build CSS -->
    <link rel="stylesheet" crossorigin href="/static/editor/assets/index-fXG0un6f.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #root {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <!-- Data inicial para o React -->
    <script>
        window.__INITIAL_DATA__ = {
            eventoId: {{ evento_id | tojson }},
            eventoNome: {{ evento_nome | tojson }},
            apiBaseUrl: '{{ api_base_url }}',
            backUrl: '{{ back_url }}'
        };
    </script>
    
    <!-- React build JS -->
    <script type="module" crossorigin src="/static/editor/assets/index-CtPw3vGI.js"></script>
</body>
</html>
