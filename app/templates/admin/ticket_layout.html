<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor de Layout de Ingressos</title>
  
  <!-- Tailwind CSS para estilização rápida e responsiva -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fabric.js para manipulação do Canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  
  <!-- Alpine.js para Estado e reatividade na UI -->
  <!-- use `defer` so Alpine doesn't run before <body> exists -->
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <style>
    body { background-color: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    /* Scrollbar customizada */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    /* Canvas com sombra e borda */
    .canvas-container {
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
      border-radius: 4px;
      overflow: hidden;
      border: 2px solid #3b82f6;
      background: white;
    }

    /* Animação dos Toasts */
    .toast-enter { transform: translateX(100%); opacity: 0; }
    .toast-enter-active { transform: translateX(0); opacity: 1; transition: all 300ms ease-out; }
    .toast-leave { opacity: 1; }
    .toast-leave-active { opacity: 0; transition: all 200ms ease-in; }
  </style>

  <!-- initialize Alpine store after Alpine is loaded -->
  <script defer>
    document.addEventListener('alpine:init', () => {
      Alpine.store('layoutEditor', {
        // ... full JS omitted for brevity in snippet for replacement but included in file ...
      });
    });
  </script>
</head>
<body x-data>

  <!-- Sistema de Toasts (Sem dependências externas) -->
  <div class="fixed top-4 right-4 z-50 flex flex-col gap-2">
    <template x-for="toast in $store.layoutEditor.toasts" :key="toast.id">
      <div class="px-4 py-3 rounded shadow-lg flex items-center gap-2 transform transition-all duration-300"
           :class="{
             'bg-green-600 text-white': toast.type === 'success',
             'bg-red-600 text-white': toast.type === 'error',
             'bg-blue-600 text-white': toast.type === 'info'
           }"
           x-transition:enter="toast-enter"
           x-transition:enter-start="toast-enter"
           x-transition:enter-end="toast-enter-active"
           x-transition:leave="toast-leave"
           x-transition:leave-start="toast-leave"
           x-transition:leave-end="toast-leave-active">
        <span x-text="toast.message"></span>
      </div>
    </template>
  </div>

  <div class="h-screen flex flex-col overflow-hidden">
    
    <!-- Topbar -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center shrink-0">
      <div>
        <h1 class="text-xl font-bold text-blue-400">Editor de Ingressos</h1>
        <p class="text-xs text-slate-400">Arraste verticalmente no canvas. Configure as propriedades na lateral.</p>
      </div>
      <div class="flex gap-2">
        <button class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded text-sm font-medium transition" @click="$store.layoutEditor.undo()">↩ Desfazer</button>
        <button class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded text-sm font-medium transition" @click="$store.layoutEditor.redo()">↪ Refazer</button>
        <button class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded text-sm font-bold shadow transition" @click="$store.layoutEditor.saveLayout()">💾 Salvar Layout</button>
      </div>
    </header>

    <!-- Indicador de Modo Grupo -->
    <template x-if="$store.layoutEditor.mode === 'editing-group'">
      <div class="bg-amber-500 text-amber-950 px-4 py-2 text-center font-bold flex justify-center items-center gap-4 shrink-0 shadow-md">
        <span>🎨 Editando Grupo - Isolado</span>
        <button class="px-3 py-1 bg-amber-700 text-amber-50 rounded hover:bg-amber-800 transition text-sm" @click="$store.layoutEditor.exitGroupEditMode()">
          ✔ Concluir Edição do Grupo (ESC)
        </button>
      </div>
    </template>

    <!-- Workspace -->
    <div class="flex flex-1 overflow-hidden">
      
      <!-- Sidebar Esquerda: Ferramentas e Lista -->
      ...
    </div>
  </div>
</body>
</html>
